<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="logos/BBD-Logo-BruinBear.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Reset your Blue Bear Detail account password.">
  <title>Reset Password | Blue Bear Detail</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html"><img class="logo__img" src="logos/BBD-Site-Logo-horizontal.png" alt="Blue Bear Detail" width="220" height="48" loading="eager" decoding="async"></a>
  </header>

  <main class="page-dark">
    <div class="page-hero page-hero--dark">
      <h1>Reset Password</h1>
      <p>Create a new password for your account.</p>
    </div>
    <div class="content-block content-block--dark">
      <div class="auth-page-card">
        <div id="reset-error" class="auth-alert auth-alert--error" role="alert" hidden></div>
        <div id="reset-success" class="auth-alert auth-alert--success" role="status" hidden></div>
        <form id="reset-form" class="auth-page-form" action="#" method="post" novalidate>
          <label for="reset-password">New password</label>
          <div class="auth-password-wrap">
            <input id="reset-password" name="password" type="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters">
            <button type="button" class="auth-password-toggle" data-pass-toggle="reset-password" aria-label="Show password">
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <label for="reset-password-confirm">Confirm new password</label>
          <div class="auth-password-wrap">
            <input id="reset-password-confirm" name="password_confirm" type="password" autocomplete="new-password" required minlength="8">
            <button type="button" class="auth-password-toggle" data-pass-toggle="reset-password-confirm" aria-label="Show password">
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <button type="submit" class="btn btn-primary">Update password</button>
        </form>
      </div>
    </div>
  </main>

  <script src="js/site-settings.js"></script>
  <script type="module" src="js/auth-reset-password.js"></script>
</body>
</html>
