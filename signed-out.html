<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="You have successfully signed out.">
  <title>Signed Out | Blue Bear Detail</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html"><img class="logo__img" src="logos/BBD-Site-Logo-horizontal.png" alt="Blue Bear Detail" width="220" height="48" loading="eager" decoding="async"></a>
    <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav-panel" aria-label="Main">
      <a href="services.html">Services</a>
      <a href="book.html">Book</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <div class="account-menu" data-account-menu>
        <button type="button" class="account-menu__trigger" id="account-menu-trigger" aria-expanded="false" aria-haspopup="true" aria-controls="account-menu-dropdown" aria-label="Account menu">
          <i class="fa-solid fa-circle-user account-menu__lucide" aria-hidden="true"></i>
        </button>
        <div class="account-menu__dropdown" id="account-menu-dropdown" hidden role="menu">
          <a href="account.html" class="account-menu__item" role="menuitem">Dashboard</a>
          <a href="login.html" class="account-menu__item account-menu__item--login" role="menuitem">Log in</a>
          <a href="signup.html" class="account-menu__item account-menu__item--signup" role="menuitem">Create account</a>
          <button type="button" class="account-menu__item account-menu__item--logout" role="menuitem" hidden>Log out</button>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-dark">
    <div class="page-hero page-hero--dark">
      <h1>You are now signed out</h1>
      <p>Redirecting to home...</p>
    </div>
    <div class="content-block content-block--dark">
      <div class="auth-page-card">
        <h2>Signed out successfully</h2>
        <p class="auth-page-card__lede">Thanks for visiting Blue Bear Detail. We will take you back to the home page in a moment.</p>
        <div class="signout-redirect-loader" aria-hidden="true">
          <span class="signout-redirect-loader__ring"></span>
        </div>
        <p class="auth-page-card__lede signout-redirect-copy">Redirecting to home...</p>
      </div>
    </div>
  </main>

  <style>
    .signout-redirect-loader {
      width: 3.2rem;
      height: 3.2rem;
      margin: 0.35rem auto 0.75rem;
      position: relative;
    }

    .signout-redirect-loader__ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: rgba(255, 255, 255, 0.96);
      display: block;
      animation: signout-spin 2s linear 1;
    }

    .signout-redirect-copy {
      text-align: center;
      margin-bottom: 0;
    }

    @keyframes signout-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <script src="js/nav.js"></script>
  <script src="js/site-settings.js"></script>
  <script type="module" src="js/auth-dropdown.js"></script>
  <script>
    setTimeout(function () {
      window.location.replace("index.html");
    }, 2000);
  </script>
</body>
</html>
